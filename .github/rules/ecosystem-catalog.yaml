  technology: Messaging
- name: webex-node-bot-framework
  language: javascript
  import_patterns:
  - webex-node-bot-framework
  technology: Messaging
- name: ciscosparkapi
  language: python
  import_patterns:
  - import\s+ciscosparkapi
  - from\s+ciscosparkapi\s+import
  technology: Messaging
