sdk_packages:
- name: webexteamssdk
  language: python
  import_patterns:
  - import\s+webexteamssdk
  - from\s+webexteamssdk\s+import
  technology: Messaging
- name: wxc_sdk
  language: python
  import_patterns:
  - import\s+wxc_sdk
  - from\s+wxc_sdk\s+import
  technology: Calling
- name: webex-js-sdk
  language: javascript
  import_patterns:
  - require\s*\(\s*['"]webex['"]
  - from\s+['"]webex['"]
  - import\s+.*\s+from\s+['"]webex['"]
  technology: Messaging
- name: '@webex/embedded-app-sdk'
